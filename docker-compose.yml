version: '3.8'

services:
  # ─── MongoDB ───
  mongo:
    image: mongo:7
    container_name: researchmind-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: researchmind

  # ─── Redis (optional caching) ───
  redis:
    image: redis:7-alpine
    container_name: researchmind-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  # ─── Backend API ───
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: researchmind-server
    restart: unless-stopped
    ports:
      - '5000:5000'
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    environment:
      MONGODB_URI: mongodb://mongo:27017/researchmind
      REDIS_URL: redis://redis:6379

  # ─── NGINX Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: researchmind-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server

volumes:
  mongo-data:
