version: '3.8'

services:
  # ─── Redis (caching and rate limiting) ───
  redis:
    image: redis:7-alpine
    container_name: researchmind-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  # ─── Full Stack API & Client ───
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: researchmind-server
    restart: unless-stopped
    ports:
      - '5000:5000'
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379

  # ─── NGINX Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: researchmind-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
